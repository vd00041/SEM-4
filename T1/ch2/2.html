<html>

<head>

</head>

<body>
    <p id="h1">hello</p>
    <button onclick="increaseFont()">Increase</button>
    <button onclick="decrease()">decrease</button>
    <button onclick="stop()">Stop</button>
    <script>
        function fun(size) {
            document.getElementById('h1').style.fontSize = size + 'px';
            document.getElementById('h1').style.color = "blue";
        }
        let font = 15;
        let Interval;
        function increaseFont() {
            clearInterval(Interval);  // Stop decrease if running
            Interval = setInterval(() => {
                if (font <= 200) {
                    fun(font++);
                }
            }, 100);
        }
        function decrease() {
            clearInterval(Interval);  // Stop increase if running
            Interval = setInterval(() => {
                if (font >= 25) {
                    fun(font--);
                }
            }, 100);

        }
        function stop() {
            clearInterval(Interval);
        }
    </script>
</body>

</html>
